version: 1

indices:
  english: &default
    include:
      - /en/publish/*/*/*/*
    exclude:
      - '**/Document.*'
    target: /en/query-index.xlsx
    properties:
      author:
        select: head > meta[name="author"]
        value: |
          attribute(el, 'content')
      title:
        select: main h1:first-of-type
        value: |
          textContent(el)
      date:
        select: head > meta[name="publication-date"]
        value: |
          dateValue(attribute(el, 'content'), 'MM-DD-YYYY')
      image:
        select: head > meta[property="og:image"]
        value: |
          match(attribute(el, 'content'), 'https:\/\/[^/]+(\/.*)')
      imageAlt:
        select: head > meta[property="og:image:alt"]
        value: |
          attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, 'content')
      tags:
        select: head > meta[property="article:tag"]
        values: |
          attribute(el, 'content')
      robots:
        select: head > meta[name="robots"]
        value: |
          attribute(el, 'content')
      lastModified:
        select: none
        value: |
          parseTimestamp(headers['last-modified'], 'ddd, DD MMM YYYY hh:mm:ss GMT')
  no-en:
    <<: *default
    include:
      - /en/publish/*/*/*/*
    target: /query-index.xlsx

  brazilian:
    <<: *default
    include:
      - /br/publish/*/*/*/*
    target: /br/query-index.xlsx

  german:
    <<: *default
    include:
      - /de/publish/*/*/*/*
    target: /de/query-index.xlsx

  spanish:
    <<: *default
    include:
      - /es/publish/*/*/*/*
    target: /es/query-index.xlsx

  french:
    <<: *default
    include:
      - /fr/publish/*/*/*/*
    target: /fr/query-index.xlsx

  italian:
    <<: *default
    include:
      - /it/publish/*/*/*/*
    target: /it/query-index.xlsx

  japanese:
    <<: *default
    include:
      - /jp/publish/*/*/*/*
    target: /jp/query-index.xlsx

  korean:
    <<: *default
    include:
      - /ko/publish/*/*/*/*
    target: /ko/query-index.xlsx

  authors-english: &authors
    include:
      - /en/authors/**
    target: /en/query-index-authors.xlsx
    properties:
      title:
        select: main h1:first-of-type
        value: |
          textContent(el)
      image:
        select: head > meta[property="og:image"]
        value: |
          match(attribute(el, 'content'), 'https:\/\/[^/]+(\/.*)')
      imageAlt:
        select: head > meta[property="og:image:alt"]
        value: |
          attribute(el, 'content')
      description:
        select: head > meta[name="description"]
        value: |
          attribute(el, 'content')
      robots:
        select: head > meta[name="robots"]
        value: |
          attribute(el, 'content')

  authors-brazilian:
    <<: *authors
    include:
      - /br/authors/**
    target: /br/query-index-authors.xlsx

  authors-german:
    <<: *authors
    include:
      - /de/authors/**
    target: /de/query-index-authors.xlsx

  authors-spanish:
    <<: *authors
    include:
      - /es/authors/**
    target: /es/query-index-authors.xlsx

  authors-french:
    <<: *authors
    include:
      - /fr/authors/**
    target: /fr/query-index-authors.xlsx

  authors-italian:
    <<: *authors
    include:
      - /it/authors/**
    target: /it/query-index-authors.xlsx

  authors-japanese:
    <<: *authors
    include:
      - /jp/authors/**
    target: /jp/query-index-authors.xlsx

  authors-korean:
    <<: *authors
    include:
      - /ko/authors/**
    target: /ko/query-index-authors.xlsx

  security:
    <<: *default
    include:
      - /security/**
    target: /security-query-index.xlsx
